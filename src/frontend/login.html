<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentagon SecureHR | Authentication</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Arial', 'Helvetica', 'sans-serif'] },
                    colors: {
                        corporate: {
                            navy: '#1E3A8A',
                            bg: '#E5E7EB',
                            panel: '#FFFFFF',
                            border: '#9CA3AF',
                            button: '#2563EB',
                            buttonHover: '#1D4ED8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-corporate-bg min-h-screen flex items-center justify-center">

    <div class="bg-corporate-panel border border-corporate-border shadow-sm w-full max-w-md">
        
        <div class="bg-corporate-navy p-4 flex flex-col items-center justify-center border-b-4 border-yellow-500">
            <img src="assets/img/pentagon.png" alt="Pentagon Logo" class="h-20 mb-2 drop-shadow-md">
            <h1 class="text-white text-xl font-bold tracking-wide">PENTAGON SecureHR</h1>
            <p class="text-gray-200 text-xs tracking-wider uppercase">System Authentication</p>
        </div>

        <div class="p-8">
            <form id="loginForm">
                
                <div class="mb-5 border-b border-gray-200 pb-5">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Select Access Level:</label>
                    <div class="flex items-center gap-4">
                        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                            <input type="radio" name="role" value="employee" class="mr-2" onchange="toggleLoginType()" checked>
                            Employee
                        </label>
                        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                            <input type="radio" name="role" value="admin" class="mr-2" onchange="toggleLoginType()">
                            HR Admin
                        </label>
                        <label class="flex items-center text-sm text-gray-600 cursor-pointer">
                            <input type="radio" name="role" value="applicant" class="mr-2" onchange="toggleLoginType()">
                            Applicant
                        </label>
                    </div>
                </div>

                <div id="credentialsBox">
                    <div class="mb-4">
                        <label for="userId" class="block text-sm font-bold text-gray-700 mb-1">Employee / Admin ID</label>
                        <input type="text" id="userId" placeholder="Enter your ID number" class="w-full px-3 py-2 border border-corporate-border rounded-sm focus:outline-none focus:border-corporate-navy focus:ring-1 focus:ring-corporate-navy text-sm">
                    </div>

                    <div class="mb-6">
                        <label for="password" class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" class="w-full px-3 py-2 border border-corporate-border rounded-sm focus:outline-none focus:border-corporate-navy focus:ring-1 focus:ring-corporate-navy text-sm">
                    </div>
                </div>

                <button id="loginBtn" type="button" onclick="handleLogin()" class="w-full bg-corporate-button hover:bg-corporate-buttonHover text-white font-bold py-2 px-4 rounded-sm transition-colors text-sm">
                    SECURE LOGIN
                </button>

                <div class="mt-4 text-center" id="helpLinks">
                    <a href="#" onclick="handleTicket('Forgot Password')" class="text-xs text-corporate-button hover:underline">Forgot Password?</a>
                    <span class="text-gray-300 mx-2">|</span>
                    <a href="#" onclick="handleTicket('IT Support')" class="text-xs text-corporate-button hover:underline">Request IT Support</a>
                </div>
            </form>
        </div>
        
        <div class="bg-gray-50 p-3 border-t border-corporate-border text-center">
            <p class="text-xs text-gray-500">© 2026 Pentagon Internal Systems. All rights reserved.</p>
        </div>

    </div>

    <script>
        function toggleLoginType() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const credBox = document.getElementById('credentialsBox');
            const btn = document.getElementById('loginBtn');
            const links = document.getElementById('helpLinks');

            if (role === 'applicant') {
                credBox.classList.add('hidden');
                links.classList.add('hidden');
                btn.innerHTML = "ENTER PUBLIC JOB BOARD";
                btn.classList.replace('bg-corporate-button', 'bg-green-600');
                btn.classList.replace('hover:bg-corporate-buttonHover', 'hover:bg-green-700');
            } else {
                credBox.classList.remove('hidden');
                links.classList.remove('hidden');
                btn.innerHTML = "SECURE LOGIN";
                btn.classList.replace('bg-green-600', 'bg-corporate-button');
                btn.classList.replace('hover:bg-green-700', 'hover:bg-corporate-buttonHover');
            }
        }

        async function handleLogin() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;

            if (role !== 'applicant' && (!userId || !password)) {
                alert("Please enter both ID and Password.");
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, password, role })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('pentagonUser', JSON.stringify(result.user));
                    
                    if (result.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert("ACCESS DENIED: " + (result.message || "Invalid Credentials"));
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                alert("Connection to authentication server failed. Is the backend running?");
            }
        }

        async function handleTicket(type) {
            const msg = prompt(`PENTAGON ${type.toUpperCase()}:\n\nPlease enter your ID and describe the issue:`);
            if (msg) {
                await fetch('/api/tickets)', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: type, details: msg })
                });
                alert(`✅ SUCCESS: Your ${type} request has been securely routed to the HR Admin dashboard.`);
            }
        }
    </script>
</body>
</html>
